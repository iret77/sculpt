name: target-smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-smoke-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked

      - name: Run target smoke suite
        run: ./scripts/ci_target_smoke.sh
