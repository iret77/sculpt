name: web-adapter-quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-adapter-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked

      - name: Run web adapter quality checks
        run: ./scripts/ci_web_adapter_quality.sh
