name: benchmark-release-gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "examples/business/invoice_reconciliation_batch.sculpt"
      - "src/**"
      - "scripts/ci_benchmark_release_gate.sh"
      - "poc/data_heavy_vibe_metrics.json"

jobs:
  data-heavy-release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked

      - name: Run release benchmark gate
        run: ./scripts/ci_benchmark_release_gate.sh

      - name: Generate benchmark delta report
        run: ./scripts/ci_benchmark_delta_report.sh

      - name: Create baseline candidate (pass-only)
        run: ./scripts/ci_benchmark_baseline_update.sh

      - name: Upload benchmark gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-release-gate-artifacts
          path: |
            poc/tmp/release_gate_sculpt_metrics.json
            poc/tmp/release_gate_sculpt_gate_input.json
            poc/tmp/release_gate_result.json
            poc/tmp/release_delta_report.json
            poc/tmp/release_delta_report.md
            poc/tmp/latest_release_gate_result.candidate.json
          if-no-files-found: error
